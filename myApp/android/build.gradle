// Top-level build file where you can add configuration options common to all sub-projects/modules.
// Force all subprojects to use Java 17
subprojects { subproject ->
    afterEvaluate {
        if (subproject.plugins.hasPlugin('com.android.application') ||
            subproject.plugins.hasPlugin('com.android.library')) {

            subproject.android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17
            subproject.android.compileOptions.targetCompatibility = JavaVersion.VERSION_17
        }
    }
}
buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
